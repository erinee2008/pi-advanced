<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme Fractal Matrix</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #f4f4f9; color: #000;
            font-family: monospace;
        }
        canvas {
            display: block; cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        #ui {
            position: absolute; top: 10px; left: 10px;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 8px; border: 1px solid #ccc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        button, input { margin-top: 10px; font-family: monospace; }
        #status { margin-top: 10px; color: #000; font-weight: bold; }
        .warning { color: #d32f2f; font-size: 0.9em; max-width: 250px; margin-top: 10px;}
    </style>
</head>
<body>

    <div id="ui">
        <strong>Extreme Fractal Matrix</strong><br><br>
        1. Select a .txt file containing Pi digits.<br>
        2. Set max rings (Warning: 15+ requires high performance).<br>
        3. Scroll to Zoom | Click & Drag to Pan<br>
        
        <br>
        <label>Max Rings: <input type="number" id="ringInput" value="15" min="1" max="18" style="width: 50px;"></label><br>
        <input type="file" id="fileInput" accept=".txt"><br>
        <div id="status">Waiting for file...</div>
        <div class="warning">Note: Text rendering turns off when zoomed out to save processing power.</div>
    </div>

    <canvas id="fractalCanvas"></canvas>

    <script>
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');
        const ringInput = document.getElementById('ringInput');
        const statusDiv = document.getElementById('status');

        let PI_STRING = "";
        let MAX_RINGS = 15; 
        const RING_SPACING = 200; 
        const BASE_NODE_RADIUS = 16;

        // Camera settings
        let scale = 0.05; // Start zoomed out
        let panX = window.innerWidth / 2;
        let panY = window.innerHeight / 2;
        let isDragging = false;
        let startDragX = 0, startDragY = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (PI_STRING.length > 0) requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize);

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            statusDiv.innerText = "Reading file...";
            statusDiv.style.color = "#000";
            const reader = new FileReader();
            
            reader.onload = function(e) {
                PI_STRING = e.target.result.replace(/[^0-9]/g, '');
                MAX_RINGS = parseInt(ringInput.value);
                
                const requiredDigits = Math.pow(2, MAX_RINGS + 1) - 1;
                
                if (PI_STRING.length < requiredDigits) {
                    statusDiv.innerText = `Error: File has ${PI_STRING.length} digits. Ring ${MAX_RINGS} requires ${requiredDigits} digits.`;
                    statusDiv.style.color = "#d32f2f";
                } else {
                    statusDiv.innerText = `Success! Loaded ${PI_STRING.length} digits. Rendering...`;
                    statusDiv.style.color = "#388e3c";
                    scale = 0.05; panX = window.innerWidth / 2; panY = window.innerHeight / 2;
                    requestAnimationFrame(draw);
                }
            };
            reader.readAsText(file);
        });

        ringInput.addEventListener('change', () => {
            if (PI_STRING.length > 0) {
                MAX_RINGS = parseInt(ringInput.value);
                requestAnimationFrame(draw);
            }
        });

        // --- Optimized Drawing Logic ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Calculate Visible Viewport Bounds (Culling)
            // Adding a buffer so things don't pop in abruptly
            const buffer = RING_SPACING; 
            const viewLeft = (-panX / scale) - buffer;
            const viewRight = ((canvas.width - panX) / scale) + buffer;
            const viewTop = (-panY / scale) - buffer;
            const viewBottom = ((canvas.height - panY) / scale) + buffer;

            ctx.save();
            ctx.translate(panX, panY);
            ctx.scale(scale, scale);

            // Level of Detail (LOD) thresholds
            const drawText = scale > 0.4;
            const drawNodes = scale > 0.08;
            
            ctx.strokeStyle = '#cccccc';
            ctx.lineWidth = 1.5 / scale;

            let nodeCount = 1; // Start at 1 because index 0 is center

            // Draw Lines and Nodes
            for (let r = 1; r <= MAX_RINGS; r++) {
                const numNodes = Math.pow(2, r + 1);
                const radius = r * RING_SPACING;

                for (let i = 0; i < numNodes; i++) {
                    const angle = (i / numNodes) * 2 * Math.PI;
                    const x = radius * Math.cos(angle);
                    const y = radius * Math.sin(angle);

                    // Skip drawing if node is completely off-screen
                    if (x < viewLeft || x > viewRight || y < viewTop || y > viewBottom) {
                        nodeCount++;
                        continue;
                    }

                    // Calculate Parent for lines
                    let pX = 0, pY = 0;
                    if (r > 1) {
                        const parentIndex = Math.floor(i / 2);
                        const parentNodes = Math.pow(2, r);
                        const parentRadius = (r - 1) * RING_SPACING;
                        const parentAngle = (parentIndex / parentNodes) * 2 * Math.PI;
                        pX = parentRadius * Math.cos(parentAngle);
                        pY = parentRadius * Math.sin(parentAngle);
                    }

                    // Draw Line
                    ctx.beginPath();
                    ctx.moveTo(pX, pY);
                    ctx.lineTo(x, y);
                    ctx.stroke();

                    // Draw Node Background
                    if (drawNodes) {
                        ctx.beginPath();
                        ctx.arc(x, y, BASE_NODE_RADIUS, 0, 2 * Math.PI);
                        ctx.fillStyle = '#ffffff';
                        ctx.fill();
                        ctx.strokeStyle = '#000000';
                        ctx.lineWidth = 1.5 / scale;
                        ctx.stroke();
                    } else {
                        // Tiny dot if zoomed way out
                        ctx.beginPath();
                        ctx.arc(x, y, 4 / scale, 0, 2 * Math.PI);
                        ctx.fillStyle = '#666';
                        ctx.fill();
                    }

                    // Draw Text
                    if (drawText) {
                        ctx.fillStyle = '#000000'; // Pure black text
                        ctx.font = '16px monospace';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(PI_STRING[nodeCount], x, y);
                    }
                    
                    nodeCount++;
                }
            }

            // Draw Center Node (Always draw if in view)
            if (0 >= viewLeft && 0 <= viewRight && 0 >= viewTop && 0 <= viewBottom && PI_STRING.length > 0) {
                if (drawNodes) {
                    ctx.beginPath();
                    ctx.arc(0, 0, BASE_NODE_RADIUS, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1.5 / scale;
                    ctx.stroke();
                    if (drawText) {
                        ctx.fillStyle = '#000000';
                        ctx.fillText(PI_STRING[0], 0, 0);
                    }
                }
            }

            ctx.restore();
        }

        // --- Interaction Listeners (Using requestAnimationFrame for smoothness) ---
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            startDragX = e.clientX - panX;
            startDragY = e.clientY - panY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = e.clientX - startDragX;
            panY = e.clientY - startDragY;
            if (PI_STRING.length > 0) requestAnimationFrame(draw);
        });

        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('mouseleave', () => { isDragging = false; });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSensitivity = 0.07;
            const direction = e.deltaY > 0 ? -1 : 1;
            const zoomFactor = 1 + direction * zoomSensitivity;

            const mouseX = e.clientX;
            const mouseY = e.clientY;

            panX = mouseX - (mouseX - panX) * zoomFactor;
            panY = mouseY - (mouseY - panY) * zoomFactor;
            scale *= zoomFactor;

            // Strict scale limits
            if (scale < 0.01) scale = 0.01; 
            if (scale > 5) scale = 5;

            if (PI_STRING.length > 0) requestAnimationFrame(draw);
        }, { passive: false });

        resize();
    </script>
</body>
</html>
